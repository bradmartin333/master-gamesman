<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>major handling routine</title>
    <link rel="stylesheet" href="../terminal.css">
</head>

<body>

    <div class="about-section">
        this chapter introduces status handling as well as scoring and room descriptions
    </div>

    <div id="app-terminal" class="terminal-window"></div>

    <script src="../terminal.js"></script>

    <script>
        const a = [
            // NSEWUD (last index is for contents of the room)
            [0, 2, 0, 0, 0, 0, 0], // room 1
            [1, 3, 3, 0, 0, 0, 0], // room 2
            [2, 0, 5, 2, 0, 0, 0], // room 3
            [0, 5, 0, 0, 0, 0, 0], // room 4
            [4, 0, 0, 3, 15, 13, 0], // room 5
            [0, 0, 1, 0, 0, 0, 0], // room 6
            [0, 8, 0, 0, 0, 0, 0], // room 7
            [7, 10, 0, 0, 0, 0, 0], // room 8
            [0, 19, 0, 8, 0, 8, 0], // room 9
            [8, 0, 11, 0, 0, 0, 0], // room 10
            [0, 0, 10, 0, 0, 0, 0], // room 11
            [0, 0, 0, 13, 0, 0, 0], // room 12
            [0, 0, 12, 0, 5, 0, 0], // room 13
            [0, 15, 17, 0, 0, 0, 0], // room 14
            [14, 0, 0, 0, 0, 5, 0], // room 15
            [17, 0, 19, 0, 0, 0, 0], // room 16
            [18, 16, 0, 14, 0, 0, 0], // room 17
            [0, 17, 0, 0, 0, 0, 0], // room 18
            [9, 0, 0, 16, 0, 0, 0] // room 19 (there is a typo in the book!)
        ];
        const n = ["HALLWAY", "AUDIENCE CHAMBER", "GREAT HALL", "PRIVATE MEETING",
            "INNER HALLWAY", "ENTRANCE", "KITCHEN", "STORE ROOM",
            "LIFT", "REAR VESTIBULE", "EXIT", "DUNGEON",
            "GUARDROOM", "MASTER BEDROOM", "UPPER HALLWAY", "TREASURY",
            "CHAMBERMAID'S ROOM", "DRESSING CHAMBER", "ROOM 19"];
        const d = ["NORTH", "SOUTH", "EAST", "WEST", "UP", "DOWN"];
        let ro = 5;

        let strength = 100;
        let wealth = 75;
        let food = 0;
        let tally = 0;
        let mk = 0; // monster kills

        let sword = false;
        let amulet = false;
        let axe = false;
        let suit = false;
        let light = false;

        function populateRooms() {
            // treasure
            for (let i = 0; i < 4; i++) {
                const rand = Math.floor(Math.random() * a.length);
                if (rand === 5 || rand === 10 || a[rand][6] != 0) {
                    i--;
                } else {
                    a[rand][6] = Math.floor(Math.random() * 100) + 10;; // between $10 and $109
                }
            }
            // monsters
            for (let i = 0; i < 4; i++) {
                const rand = Math.floor(Math.random() * a.length);
                if (rand === 5 || rand === 10 || a[rand][6] != 0) {
                    i--;
                } else {
                    a[rand][6] = -i; // mark the room as containing a monster
                }
            }
            // between $100 and $199 in the private meeting room and the treasury
            a[3][6] = 100 + Math.floor(Math.random() * 100);
            a[15][6] = 100 + Math.floor(Math.random() * 100);
        }

        function getStatus() {
            const lightState = light ? "\n\n" : "\nit is too dark to see anything\n\n";
            let s = `${terminalInstance.name}, your strength is ${strength}`;
            if (wealth > 0) {
                s += `\nyou have $${wealth}`;
            }
            if (food > 0) {
                s += `\nyour provisions sack holds ${food} units of FOOD`;
            }
            if (suit) {
                s += `\nyou are wearing ARMOR`;
            }
            if (!axe && !sword && !amulet) {
                s += lightState;
                return s;
            }
            s += "\nyou are carrying ";
            if (axe) {
                s += `an AXE `;
            }
            if (sword) {
                s += `a SWORD `;
            }
            if (axe + sword > 0 && amulet) {
                s += `and `;
            }
            if (amulet) {
                s += `the MAGIC AMULET`;
            }
            s += lightState;
            return s;
        }

        function prompt() {
            let p = `you are in the ${n[ro]}\n\n`;
            // possible moves
            if (a[ro][0] != 0) {
                p += `a door leads to the ${d[0]}\n`;
            }
            if (a[ro][1] != 0) {
                p += `there is an exit to the ${d[1]}\n`;
            }
            if (a[ro][2] != 0) {
                p += `you can leave via the ${d[2]}\n`;
            }
            if (a[ro][3] != 0) {
                p += `a doorway opens to the ${d[3]}\n`;
            }
            if (a[ro][4] != 0) {
                p += `there is a staircase leading ${d[4]}\n`;
            }
            if (a[ro][5] != 0) {
                p += `there is a staircase leading ${d[5]}\n`;
            }
            // what is in the room
            if (light) {
                if (a[ro][6] > 9) {
                    p += `\nthere is treasue here worth $${a[ro][6]}, but you cannot collect it, yet...\n`;
                } else if (a[ro][6] < 0) {
                    p += `\n\n\ndanger... there is a monster here....\nit is a `;
                    const m = -a[ro][6];
                    let ff = 0;
                    if (m == 1) {
                        p += `FEROCIOUS WEREWOLF\n`;
                        ff = 5;
                    } else if (m == 2) {
                        p += `FANTASTICAL FLESHGORGER\n`;
                        ff = 10;
                    } else if (m == 3) {
                        p += `MALOVENTY MALDEMER\n`;
                        ff = 15;
                    } else if (m == 4) {
                        p += `DEVASTATING ICE-DRAGON\n`;
                        ff = 20;
                    }
                    p += `the danger level is ${ff}!!\n\n`;
                }
            }
            return getStatus() + p;
        }

        function move(dir) {
            if (a[ro][dir] != 0) {
                ro = a[ro][dir] - 1;
                if (ro == 10) {
                    const score = (3 * tally) + (5 * strength) + (2 * wealth) + food + (10 * mk);
                    const winMessage = `you have found the exit from the castle!\n\nyour final score is ${score}`;
                    terminalInstance.commands = { '*': () => winMessage };
                    return winMessage;
                }
                strength -= 5;
                tally++;
                let ret = prompt();
                if (strength < 10) {
                    ret += "\nwarning, your strength is running low\n";
                }
                if (strength < 1) {
                    const deathMessage = "you have died.........";
                    terminalInstance.commands = { '*': () => deathMessage };
                    return deathMessage;
                }
                ret += "\nwhich direction\n";
                return ret;
            } else {
                if (dir == 0) {
                    return "you cannot move that way\n\n" + prompt();
                } else if (dir == 1) {
                    return "you can't walk through walls\n\n" + prompt();
                } else if (dir == 2) {
                    return "try another direction\n\n" + prompt();
                } else if (dir == 3) {
                    return `there is no door to the ${d[3]}\n\n` + prompt();
                } else if (dir == 4) {
                    return "there is no staircase here\n\n" + prompt();
                } else if (dir == 5) {
                    return "there is no staircase here\n\n" + prompt();
                }
            }
        }

        populateRooms();

        const terminalInstance = new Terminal('app-terminal', {
            commands: {
                'n': () => move(0),
                's': () => move(1),
                'e': () => move(2),
                'w': () => move(3),
                'u': () => move(4),
                'd': () => move(5),
                'welcome': () => `welcome, ${terminalInstance.name}! your adventure begins...\n\n` + prompt(),
                '*': () => "invalid command\n\n" + prompt()
            }
        });
    </script>

</body>

</html>
